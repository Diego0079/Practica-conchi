<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rey leon</title>
</head>
<body>
    <header>
        <div class="nav-menu">
            <h1 id="title-menu" class="nombre"><a href="#home">El Rey Leon</a></h1>
            <button class="boton" onclick="boton()">Menu</button>
            <ul id="menu" class="menu">
                <li><a href="#home">Inicio</a></li>
                <li><a href="#galeria">Galeria</a></li>
                <li><a href="#entradas">Entradas</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </div>
    </header>
    
    <section id="home"></section>

    <section id="galeria">
        <h1 class="titulo">Galeria de imagenes</h1>
        <div class="foto-grande">
            <img id="arriba" src="fts/el_rey_leon_4.jpg " alt="El rey Leon" >
        </div>

        <div class="fotos-pequenas">
            <button onclick="cambiaruno()" id="boton-uno">
                <img id="pequena-uno" src="fts/6A6ACA69-CBCC-470F-AF7C16BB53A68A87-1.jpg" alt="El rey Leon" >
            </button>
            <button onclick="cambiardos()" id="boton-dos">
                <img id="pequena-dos" src="fts/el-rey-leon-musical-madrid-1.jpg" alt="El rey Leon" >
            </button>
            <button onclick="cambiartres()" id="boton-tres">
                <img id="pequena-tres" src="fts/el_rey_leon_4.jpg" alt="El rey Leon" >
            </button>
        </div>

    </section>


    <section id="entradas">
        <h1 class="titulo">¡Compra tus Entradas!</h1>
        <div class="caja">
            <form onsubmit="alertaCompra()">
                <label id="text-entrada" for="entradas">Nº Entradas</label>
                <input id="numero" type="number" min="0" value="0"></input>
                <label for="enviar"></label>
                <input type="submit" value="Comprar"></input>
                <p id="parrafo-total">Total:</p>
                <span id="total">0€</span>
            </form>
            

        </div>
    </section>

        <section id="contacto">
        <h1 class="titulo">Contactanos</h1>
        <div class="caja">
            <form onsubmit="validar()">
                <label for="Nombre">Nombre:</label>
                <input placeholder="Introduce tu nombre" id="nombre" type="Text"></input>
                <br>
                <label for="Apellido">Apellido:</label>
                <input placeholder="Introduce tu apellido" id="apellido" type="Text"></input>
                <br>
                <label for="mail">E-Mail:</label>
                <input placeholder="Introduce tu email" id="email" type="email"></input>
                <br>
                <br>
                <label for="texto"></label>
                <textarea id="text-area" placeholder="Describe el concepto del mail"></textarea>
                <br>
                <br>
                <label for="enviar"></label>
                <input type="submit" value="Enviar"></input>
            </form>
            

        </div>
    </section>

    <footer>
        <div class="foot">
            <div class="title-foot">
                <h2>Hecho por Diego Martinez Avello</h2>
            </div>
            <div class="foot-der">
                <ul>
                    <li><a href="mailto:kyv55364@educastur.es">✉ | E-Mail</a></li>
                    <li><a href="#">✆ | Telefono de Contacto</a></li>
                </ul>
            </div>    
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
